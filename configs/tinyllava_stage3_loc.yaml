# =============================================================
# Stage 3 (TinyLLaVA) — Fine-tuning with textual [y1,x1,y2,x2] bboxes
# =============================================================
# Continues from Stage 2 checkpoint on enriched DD-VQA annotations that
# include facial-region bounding boxes as plain text. No new tokens are
# added to the vocabulary.
#
# Usage:
#   python training/train_stage2.py --config configs/tinyllava_stage3_loc.yaml

seed: 42

# --- Backbone ---
backbone: "tinyllava"
tinyllama_model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
siglip_model: "google/siglip-so400m-patch14-384"
dinov2_model: "facebook/dinov2-large"
tinyllava_weights: "outputs/tinyllava_weights.pt"
load_tinyllava_weights: true
use_dino: true
mof_strategy: "interleave"
vision_select_layer: -2
connector_hidden_dim: 2048
image_size: 384

# --- Stage 2 checkpoint ---
adapter_checkpoint: "outputs/tinyllava_stage2_finetune/checkpoint-final.pt"
lora_checkpoint: "outputs/tinyllava_stage2_finetune/checkpoint-final.pt"

# --- Data (enriched with [y1,x1,y2,x2]) ---
train_metadata: "/datasets/deepfake/ddvqa_prepared/train_loc.jsonl"
val_metadata: "/datasets/deepfake/ddvqa_prepared/val_loc.jsonl"
image_root: "/datasets/deepfake/ddvqa_prepared/frames"
max_text_length: 384

# --- LoRA ---
lora_rank: 16
lora_alpha: 32
lora_target_modules: ["q_proj", "v_proj"]
lora_dropout: 0.05

# --- Training ---
max_epochs: 5
batch_size: 32
gradient_accumulation_steps: 2
num_workers: 8
balanced_sampling: true

adapter_lr: 5.0e-5
lora_lr: 1.0e-5
warmup_ratio: 0.03
max_grad_norm: 1.0

mixed_precision: "bf16"
gradient_checkpointing: true

# --- Logging & checkpointing ---
log_interval: 50
save_interval: 500
val_interval: 500
sample_interval: 1000
output_dir: "outputs/tinyllava_stage3_loc"
