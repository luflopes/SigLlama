# =============================================================
# Stage 2 (TinyLLaVA) — DINO adapter (cont.) + LoRA on TinyLlama
# =============================================================
# TinyLlama target modules mirror the LLaMA convention:
#   q_proj, v_proj (+ optionally k_proj, o_proj for stronger LoRA).
#
# With use_dino=false this is the FIRST trainable stage (connector and
# SigLIP stay frozen; only LoRA is learned).
#
# Usage:
#   python training/train_stage2.py --config configs/tinyllava_stage2_finetune.yaml

seed: 42

# --- Backbone ---
backbone: "tinyllava"
tinyllama_model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
siglip_model: "google/siglip-so400m-patch14-384"
dinov2_model: "facebook/dinov2-large"
tinyllava_weights: "outputs/tinyllava_weights.pt"
load_tinyllava_weights: true
use_dino: true
mof_strategy: "interleave"
vision_select_layer: -2
connector_hidden_dim: 2048
image_size: 384

# --- Stage 1 checkpoint (optional if use_dino=false) ---
adapter_checkpoint: "outputs/tinyllava_stage1_adapter/checkpoint-final.pt"
lora_checkpoint: null

# --- Data ---
train_metadata: "/datasets/deepfake/ddvqa_prepared/train.jsonl"
val_metadata: "/datasets/deepfake/ddvqa_prepared/val.jsonl"
image_root: "/datasets/deepfake/ddvqa_prepared/frames"
max_text_length: 256

# --- LoRA ---
lora_rank: 16
lora_alpha: 32
lora_target_modules: ["q_proj", "v_proj"]
lora_dropout: 0.05

# --- Training ---
max_epochs: 5
batch_size: 32
gradient_accumulation_steps: 2    # effective batch = 64
num_workers: 8
balanced_sampling: true

adapter_lr: 1.0e-4
lora_lr: 2.0e-5
warmup_ratio: 0.03
max_grad_norm: 1.0

mixed_precision: "bf16"
gradient_checkpointing: true

# --- Logging & checkpointing ---
log_interval: 50
save_interval: 500
val_interval: 500
sample_interval: 1000
output_dir: "outputs/tinyllava_stage2_finetune"
