# =============================================================
# Stage 2 (TinyLLaVA) — LoRA only on TinyLlama
# =============================================================
# Partida direta na Stage 2, SEM DINOv2 (TinyLLaVA puro):
#   * SigLIP, MLP connector e TinyLlama vêm dos pesos fine-tunados do
#     bczhou/TinyLLaVA-1.5B (share recipe) e ficam congelados no forward.
#   * Não há DINOv2 nem adapter — apenas SigLIP (729 tokens) alimenta a LLM.
#   * Único componente treinado: LoRA em q_proj e v_proj da TinyLlama
#     (convenção LLaMA).
#
# Usage:
#   python training/train_stage2.py --config configs/tinyllava_stage2_finetune.yaml

seed: 42

# --- Backbone ---
backbone: "tinyllava"
tinyllama_model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
siglip_model: "google/siglip-so400m-patch14-384"
tinyllava_weights: "outputs/tinyllava_weights.pt"
load_tinyllava_weights: true
use_dino: false
vision_select_layer: -2
connector_hidden_dim: 2048
image_size: 384

# --- Stage 1 checkpoint (sem Stage 1 nem DINO adapter) ---
adapter_checkpoint: null
lora_checkpoint: null

# --- Data ---
train_metadata: "/datasets/deepfake/ddvqa_prepared/train.jsonl"
val_metadata: "/datasets/deepfake/ddvqa_prepared/val.jsonl"
image_root: "/datasets/deepfake/ddvqa_prepared/frames"
max_text_length: 256

# --- LoRA ---
# Run C: voltamos para LoRA *só* em q_proj/v_proj (a configuração
# tradicional). O motivo é que Runs A e B sofreram de um bug de off-by-one
# nos labels (o token de veredito era mascarado como prefixo) — toda a
# capacidade extra do LoRA expandido estava sendo aplicada à posição
# errada. Com os labels corrigidos (ver data/prompt_formats.py +
# DDVQADataset), só q_proj/v_proj basta para adaptar o classificador.
lora_rank: 32
lora_alpha: 64
lora_target_modules:
  - "q_proj"
  - "v_proj"
lora_dropout: 0.05

# --- Training ---
max_epochs: 5
batch_size: 32
gradient_accumulation_steps: 2    # effective batch = 64
num_workers: 8

# ---- Run C: labels corrigidos + LoRA enxuto + connector destravado ----
# Diagnóstico das Runs A/B: o token de veredito (Real/Fake) estava sendo
# mascarado como parte do prefixo por um off-by-one na tokenização (o
# espaço final em "ASSISTANT: " virava um token solto "▁" e fundia com
# o veredito quando o texto completo era tokenizado de uma vez). Isso
# explicava (a) recall=0 do parser estrito, (b) acurácia=0 mesmo com
# constrained decoding, e (c) por que aumentar first_token_loss_weight
# só piorava — o peso ia para o ponto-final, não para o veredito.
#
# Esta run aplica:
#  1. Tokenização em duas etapas (prefix + answer) — fix em
#     data/prompt_formats.py + data/ddvqa_dataset.py.
#  2. LoRA reduzido para q_proj/v_proj (capacidade clássica) — agora
#     que o sinal de classificação chega no token certo, não precisa
#     de capacidade extra para superar o prior conversacional.
#  3. first_token_loss_weight=2.0 — peso moderado, agora aplicado ao
#     token correto (▁Real para reais, ▁F para fakes).
#  4. Connector permanece descongelado (Layer B), pois ainda precisamos
#     que o sinal visual ganhe direções discriminativas para deepfake.
#  5. balanced_sampling=false — distribuição natural 80:20 fake:real.

balanced_sampling: false
first_token_loss_weight: 2.0

# Layer B — descongelar o MLP connector (LR 4× menor que o LoRA).
train_connector: true
connector_lr: 5.0e-6

# adapter_lr é ignorado (sem DINO adapter), mantido por compatibilidade.
adapter_lr: 1.0e-4
lora_lr: 2.0e-5
warmup_ratio: 0.03
max_grad_norm: 1.0

mixed_precision: "bf16"
gradient_checkpointing: true

# --- Logging & checkpointing ---
# DD-VQA: 10 806 train samples, batch_size=32, grad_accum=2 -> ~169 optim steps
# por época (845 steps em 5 épocas). Intervalos dimensionados para essa escala;
# fallback garante 1 validação + 1 sample ao final de cada época.
log_interval: 20
save_interval: 200
val_interval: 100
sample_interval: 100
output_dir: "outputs/tinyllava_stage2_finetune_runc"
