# =============================================================
# Stage 2 (TinyLLaVA) — Run E: I-MoF com DINOv2
# =============================================================
# SigLIP-So400m + MLP connector + TinyLlama vêm dos pesos fine-tunados
# do bczhou/TinyLLaVA-1.5B (share recipe). DINOv2-Large é frozen,
# carregado direto do facebook/dinov2-large; só o adapter (linear
# 1024->2048) é treinável. I-MoF interleave funde os 729 tokens de cada
# stream em 1458 tokens visuais que entram na LLM.
#
# Treináveis: LoRA (q_proj/v_proj), MLP connector (LR baixo) e
# DINOv2 adapter (LR alto, sem Stage 1).
#
# Usage:
#   python training/train_stage2.py --config configs/tinyllava_stage2_finetune.yaml

seed: 42

# --- Backbone ---
backbone: "tinyllava"
tinyllama_model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
siglip_model: "google/siglip-so400m-patch14-384"
tinyllava_weights: "outputs/tinyllava_weights.pt"
load_tinyllava_weights: true
use_dino: true
vision_select_layer: -2
connector_hidden_dim: 2048
image_size: 384

# --- Stage 1 checkpoint ---
# Carrega o adapter DINOv2 pretreinado em LCS-558K (~3 125 optim steps,
# 1 epoch). Sem isso o adapter sairia random e o I-MoF jogaria tokens
# DINOv2 ruidosos no LLM nas primeiras milhares de iterações,
# competindo com (e degradando) o sinal já alinhado do SigLIP.
adapter_checkpoint: "outputs/tinyllava_stage1_adapter/checkpoint-final.pt"
lora_checkpoint: null

# --- Data ---
train_metadata: "/datasets/deepfake/ddvqa_prepared/train.jsonl"
val_metadata: "/datasets/deepfake/ddvqa_prepared/val.jsonl"
test_metadata: "/datasets/deepfake/ddvqa_prepared/test.jsonl"
image_root: "/datasets/deepfake/ddvqa_prepared/frames"
max_text_length: 256

# --- LoRA ---
# Run C: voltamos para LoRA *só* em q_proj/v_proj (a configuração
# tradicional). O motivo é que Runs A e B sofreram de um bug de off-by-one
# nos labels (o token de veredito era mascarado como prefixo) — toda a
# capacidade extra do LoRA expandido estava sendo aplicada à posição
# errada. Com os labels corrigidos (ver data/prompt_formats.py +
# DDVQADataset), só q_proj/v_proj basta para adaptar o classificador.
lora_rank: 32
lora_alpha: 64
lora_target_modules:
  - "q_proj"
  - "v_proj"
lora_dropout: 0.05

# --- Training ---
# Run E: I-MoF interleave dobra os tokens visuais (729 -> 1458) e adiciona
# o forward do DINOv2-Large. Dividimos batch_size por 2 e dobramos
# gradient_accumulation_steps para manter o effective batch em 64 sem
# estourar a VRAM de 47 GB.
max_epochs: 5
batch_size: 16
gradient_accumulation_steps: 4    # effective batch = 64
num_workers: 2

# ---- Run E: I-MoF com DINOv2 (Stage 1 pretreinado) ----
# Run D-2 (sem DINO) atingiu F1=0.69 e specificidade real=72%, mas o
# recall por método ficou desigual: Deepfakes/FaceSwap 0.65-0.75 vs.
# NeuralTextures 0.32 e FaceShifter 0.47 — perfil clássico do que
# SigLIP-So400m (treinado com legendas) deixa escapar: artefatos finos
# de textura e identidade. DINOv2 SSL captura esses sinais melhor.
#
# Pipeline desta run:
#   1) adapter DINOv2 pretreinado em LCS-558K (Stage 1) — alinhado ao
#      espaço da TinyLlama, não é mais random init.
#   2) Stage 2 destrava 3 grupos: adapter (LR baixo, refinamento),
#      connector (LR baixo, ajuste à presença do novo stream) e LoRA
#      q/v_proj (LR padrão para a adaptação ao DD-VQA).
#   3) Mantemos: balanced_sampling=true, first_token_loss_weight=1.0,
#      labels corrigidos, EOS supervisionado.

balanced_sampling: true
first_token_loss_weight: 1.0

# MLP connector destravado com LR baixo: deixa o connector se reajustar
# à entrada do segundo stream visual (DINO via I-MoF) sem apagar a
# alinhamento herdado do TinyLLaVA share recipe.
train_connector: true
connector_lr: 5.0e-6

# Adapter DINOv2 vem pretreinado (Stage 1). LR moderado: refinamento
# para o domínio deepfake, não convergência do zero. Se fosse random
# init seria 1.0e-4; com pretrained, 5.0e-5 evita destruir a
# representação aprendida em LCS-558K.
adapter_lr: 5.0e-5
lora_lr: 2.0e-5
warmup_ratio: 0.03
max_grad_norm: 1.0

mixed_precision: "bf16"
gradient_checkpointing: true

# --- Logging & checkpointing ---
# DD-VQA: 10 806 train samples. WeightedRandomSampler usa
# num_samples=len(weights) com replacement, então cada época passa por
# ~10 806 amostras (com proporção real/fake balanceada 50/50). Com
# batch_size=16 e grad_accum=4: ~169 optim steps/época × 5 épocas
# = ~845 optim steps totais (mesmo schedule de Run D).
log_interval: 20
save_interval: 200
val_interval: 100
sample_interval: 100
output_dir: "outputs/tinyllava_stage2_finetune_rune"
