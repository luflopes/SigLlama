# =============================================================
# Stage 2 (TinyLLaVA) — LoRA only on TinyLlama
# =============================================================
# Partida direta na Stage 2, SEM DINOv2 (TinyLLaVA puro):
#   * SigLIP, MLP connector e TinyLlama vêm dos pesos fine-tunados do
#     bczhou/TinyLLaVA-1.5B (share recipe) e ficam congelados no forward.
#   * Não há DINOv2 nem adapter — apenas SigLIP (729 tokens) alimenta a LLM.
#   * Único componente treinado: LoRA em q_proj e v_proj da TinyLlama
#     (convenção LLaMA).
#
# Usage:
#   python training/train_stage2.py --config configs/tinyllava_stage2_finetune.yaml

seed: 42

# --- Backbone ---
backbone: "tinyllava"
tinyllama_model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
siglip_model: "google/siglip-so400m-patch14-384"
tinyllava_weights: "outputs/tinyllava_weights.pt"
load_tinyllava_weights: true
use_dino: false
vision_select_layer: -2
connector_hidden_dim: 2048
image_size: 384

# --- Stage 1 checkpoint (sem Stage 1 nem DINO adapter) ---
adapter_checkpoint: null
lora_checkpoint: null

# --- Data ---
train_metadata: "/datasets/deepfake/ddvqa_prepared/train.jsonl"
val_metadata: "/datasets/deepfake/ddvqa_prepared/val.jsonl"
image_root: "/datasets/deepfake/ddvqa_prepared/frames"
max_text_length: 256

# --- LoRA ---
# Rank/alpha e target_modules expandidos p/ superar o prior conversacional
# do checkpoint bczhou/TinyLLaVA-1.5B (que tende a responder "Real" por
# default). Sem DINOv2, a LoRA precisa compensar a falta de features de
# artefatos finos, logo aumentamos a capacidade adaptável (~4x em params).
lora_rank: 32
lora_alpha: 64
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"
lora_dropout: 0.05

# --- Training ---
max_epochs: 5
batch_size: 32
gradient_accumulation_steps: 2    # effective batch = 64
num_workers: 8
# Dataset tem distribuição natural ~80:20 fake:real e o LLM pré-treinado
# tem viés para responder "Real". Sem rebalancear o gradiente, o caminho
# de menor resistência é ficar no prior e dizer "Real" em tudo (exatamente
# o que vimos na avaliação com first-token constrangido). Rebalanceamento
# + first_token_loss_weight atuam juntos para forçar o aprendizado real.
balanced_sampling: true

# Layer A — peso extra na CE do *primeiro token válido* da resposta.
# Em DD-VQA a resposta abre com "Real."/"Fake." (normalizado em
# DDVQADataset) seguido da justificativa. A CE vanilla dilui essa
# decisão em ~1% da loss; um α ∈ [5, 10] concentra gradiente na cabeça
# de classificação sem sacrificar a qualidade do texto gerado.
first_token_loss_weight: 5.0

# Layer B (desligada) — descongelar o MLP connector. Ative DEPOIS da
# Camada A rodar e estabilizar. Se habilitar, usar lr muito baixo para
# não destruir o alinhamento herdado do TinyLLaVA checkpoint.
train_connector: false
connector_lr: 5.0e-6

# adapter_lr é ignorado (sem DINO adapter), mantido por compatibilidade.
adapter_lr: 1.0e-4
lora_lr: 2.0e-5
warmup_ratio: 0.03
max_grad_norm: 1.0

mixed_precision: "bf16"
gradient_checkpointing: true

# --- Logging & checkpointing ---
# DD-VQA: 10 806 train samples, batch_size=32, grad_accum=2 -> ~169 optim steps
# por época (845 steps em 5 épocas). Intervalos dimensionados para essa escala;
# fallback garante 1 validação + 1 sample ao final de cada época.
log_interval: 20
save_interval: 200
val_interval: 100
sample_interval: 100
output_dir: "outputs/tinyllava_stage2_finetune"
