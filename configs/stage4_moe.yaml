# =============================================================
# Stage 4 — LoRA-MoE fine-tuning per manipulation technique
# =============================================================
# Replace single LoRA with LoRA-MoE: one expert per deepfake
# technique + a learned router based on visual features.
#
# Usage:
#   python training/train_stage4.py --config configs/stage4_moe.yaml

seed: 42

# --- Models ---
paligemma_model: "google/paligemma2-3b-pt-448"
dinov2_model: "facebook/dinov2-large"
mof_strategy: "interleave"

# --- Stage 3 checkpoint ---
adapter_checkpoint: "outputs/stage3_loc/checkpoint-final.pt"
lora_checkpoint: "outputs/stage3_loc/checkpoint-final.pt"

# --- Data ---
train_metadata: "/datasets/deepfake/ddvqa_prepared/train_loc.jsonl"
val_metadata: "/datasets/deepfake/ddvqa_prepared/val_loc.jsonl"
image_root: "/datasets/deepfake/ddvqa_prepared/frames"
max_text_length: 384

# --- LoRA-MoE ---
num_experts: 4
expert_names: ["Deepfakes", "Face2Face", "FaceSwap", "NeuralTextures"]
lora_rank: 16
lora_alpha: 32
lora_target_modules: ["q_proj", "v_proj"]
lora_dropout: 0.05
router_hidden_dim: 512
router_loss_weight: 0.1

# --- Training ---
max_epochs: 5
batch_size: 16
gradient_accumulation_steps: 4
num_workers: 4
balanced_sampling: true

adapter_lr: 5.0e-5
lora_lr: 1.0e-5
router_lr: 1.0e-4
warmup_ratio: 0.03
max_grad_norm: 1.0

mixed_precision: "bf16"
gradient_checkpointing: true

# --- Logging & checkpointing ---
log_interval: 50
save_interval: 500
val_interval: 500
sample_interval: 1000
output_dir: "outputs/stage4_moe"
