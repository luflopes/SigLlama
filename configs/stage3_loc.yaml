# =============================================================
# Stage 3 — Fine-tuning with <loc> token annotations
# =============================================================
# Continue from Stage 2 checkpoint, now with enriched DD-VQA
# annotations that include facial region <loc> tokens.
#
# Usage:
#   python training/train_stage2.py --config configs/stage3_loc.yaml

seed: 42

# --- Models ---
backbone: "paligemma"
paligemma_model: "google/paligemma2-3b-pt-448"
dinov2_model: "facebook/dinov2-large"
mof_strategy: "interleave"
use_dino: true

# --- Stage 2 checkpoint ---
adapter_checkpoint: "outputs/stage2_finetune/checkpoint-final.pt"
lora_checkpoint: "outputs/stage2_finetune/checkpoint-final.pt"

# --- Data (enriched with <loc> tokens) ---
train_metadata: "/datasets/deepfake/ddvqa_prepared/train_loc.jsonl"
val_metadata: "/datasets/deepfake/ddvqa_prepared/val_loc.jsonl"
image_root: "/datasets/deepfake/ddvqa_prepared/frames"
max_text_length: 384

# --- LoRA ---
lora_rank: 16
lora_alpha: 32
lora_target_modules: ["q_proj", "v_proj"]
lora_dropout: 0.05

# --- Training ---
max_epochs: 5
batch_size: 16
gradient_accumulation_steps: 4
num_workers: 8
balanced_sampling: true

adapter_lr: 5.0e-5
lora_lr: 1.0e-5
warmup_ratio: 0.03
max_grad_norm: 1.0

mixed_precision: "bf16"
gradient_checkpointing: true

# --- Logging & checkpointing ---
log_interval: 50
save_interval: 500
val_interval: 500
sample_interval: 1000
output_dir: "outputs/stage3_loc"
