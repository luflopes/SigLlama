# =============================================================
# Stage 1 — Adapter pre-training on LCS-558K
# =============================================================
# Train only the MLP adapter that projects SigLIP visual features
# into TinyLlama's embedding space.  Both SigLIP and TinyLlama
# are frozen.
#
# Usage:
#   python training/pretrain.py --config configs/pretraining.yaml
#   accelerate launch training/pretrain.py --config configs/pretraining.yaml

seed: 0

# --- Models ---
siglip_model: "google/siglip-base-patch16-224"
llm_model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
visual_dim: 768       # SigLIP hidden size
llm_dim: 2048         # TinyLlama hidden size

# --- Data ---
metadata_path: "/data/lcs-558k/blip_laion_cc_sbu_558k_meta.json"
image_root: "/data/lcs-558k"
max_text_length: 128
val_size: 1000        # held-out samples for validation

# --- Training ---
max_epochs: 1
batch_size: 32
gradient_accumulation_steps: 1
num_workers: 4

learning_rate: 1.0e-3
weight_decay: 0.0
warmup_ratio: 0.03
max_grad_norm: 1.0

mixed_precision: "bf16"       # "bf16", "fp16", or "no"
gradient_checkpointing: true  # saves VRAM on the frozen LLM

# --- Logging & checkpointing ---
log_interval: 100         # log train loss every N steps
save_interval: 2000       # save adapter checkpoint every N steps
val_interval: 2000        # run validation every N steps
sample_interval: 5000     # generate sample captions every N steps
output_dir: "outputs/pretraining"
