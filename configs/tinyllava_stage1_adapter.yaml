# =============================================================
# Stage 1 (TinyLLaVA) — DINOv2 Adapter pre-training on LCS-558K
# =============================================================
# Objetivo: alinhar o stream visual do DINOv2-Large à hidden space da
# TinyLlama (2048-d) usando captioning na LCS-558K.
#
# Treinável: APENAS o adapter linear DINOv2 (1024 -> 2048, ~2.1M params).
# Frozen: SigLIP + MLP connector + TinyLlama (já alinhados via share
# recipe do bczhou/TinyLLaVA-1.5B) + DINOv2-Large (representação SSL).
#
# Loss: next-token prediction sobre a caption (LM loss padrão). O
# gradiente flui da loss através da TinyLlama (frozen) e do connector
# (frozen) até inputs_embeds, e do inputs_embeds desce pelo I-MoF até o
# adapter — únicos parâmetros que se atualizam.
#
# Por que I-MoF interleave durante Stage 1: o adapter precisa aprender
# uma projeção compatível com a *mistura* de tokens SigLIP + DINOv2 que
# a Stage 2 vai consumir. Treinar no formato final evita gap de
# distribuição entre as duas etapas.
#
# Usage:
#   python training/train_stage1.py --config configs/tinyllava_stage1_adapter.yaml

seed: 42

# --- Backbone ---
backbone: "tinyllava"
tinyllama_model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
siglip_model: "google/siglip-so400m-patch14-384"
dinov2_model: "facebook/dinov2-large"
tinyllava_weights: "outputs/tinyllava_weights.pt"
load_tinyllava_weights: true
use_dino: true
mof_strategy: "interleave"
vision_select_layer: -2
connector_hidden_dim: 2048
image_size: 384

# --- Data ---
# LCS-558K completo (558 128 pares BLIP imagem-texto). Sub-amostragem
# desabilitada para maximizar a diversidade que o adapter vê.
metadata_path: "/datasets/deepfake/lcs-558k/blip_laion_cc_sbu_558k_meta.json"
image_root: "/datasets/deepfake/lcs-558k"
max_text_length: 128
max_train_samples: null
val_size: 1000

# --- Training ---
# Pipeline pesado: I-MoF interleave dobra tokens visuais (729 -> 1458),
# DINOv2-Large roda forward (no_grad), TinyLlama frozen (gradient_checkpointing).
# Throughput observado anteriormente: ~7s/it com batch=32 e grad_accum=2.
#
# Custo estimado: 558 128 / 32 = 17 442 batches/épocas x 5 épocas = 87 210
# batches × 7s = ~170h (~7 dias). Considere:
#   - aumentar batch_size para 64 (LLM frozen, ativações recomputadas via
#     gradient_checkpointing -> tem folga de VRAM). Pode reduzir para
#     ~4-5 dias se o IO/DINO não for gargalo.
#   - reduzir max_epochs para 2-3 se a val_loss saturar antes (geralmente
#     adapter linear converge bem rápido em LCS-558K).
# 5 épocas × 558k = 2.79M passes = 28x mais sinal que a Stage 1 anterior
# (1 epoch × 200k = 200k passes). Esperado: adapter mais discriminativo,
# especialmente para artefatos finos que diferenciam NeuralTextures e
# FaceShifter (gargalos identificados em Run E).
max_epochs: 5
batch_size: 32
gradient_accumulation_steps: 2    # effective batch = 64
num_workers: 8

# SGD com momentum (recipe LLaVA/TruthLens) costuma ser mais estável
# para adapter linear que AdamW. learning_rate=1e-4 é o padrão para
# projeções 2M~10M de parâmetros nessa escala de dados.
learning_rate: 1.0e-4
warmup_ratio: 0.03
max_grad_norm: 1.0

mixed_precision: "bf16"
gradient_checkpointing: true

# --- Logging & checkpointing ---
# 558 128 samples / batch=32 / grad_accum=2 = ~8721 optim steps/épocas
# x 5 épocas = ~43 605 optim steps totais. Intervalos escalados para
# manter granularidade de monitoramento sem inundar o disco com checkpoints
# (cada um ocupa ~10MB só do adapter, mas optimizer + scheduler somam mais).
log_interval: 200
save_interval: 2000
val_interval: 2000
sample_interval: 4000
output_dir: "outputs/tinyllava_stage1_adapter_full"
