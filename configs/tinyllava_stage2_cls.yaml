# =============================================================
# Stage 2 (TinyLLaVA) — Run G: Veredito desacoplado via DINOv2
# =============================================================
# O LLM NÃO decide mais o veredito Real/Fake. Durante treino, o
# ground-truth é injetado como prefixo da resposta (já funciona assim
# via _normalize_answer_with_verdict). A diferença em relação ao Run F
# é que removemos balanced_sampling e reduzimos first_token_loss_weight
# para 1.0 — o LLM foca em gerar explicações de qualidade.
#
# Na inferência, o veredito vem do DINOv2 classifier (Stage A).
#
# Usage:
#   python training/train_stage2.py --config configs/tinyllava_stage2_cls.yaml

seed: 42

# --- Backbone ---
backbone: "tinyllava"
tinyllama_model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
siglip_model: "google/siglip-so400m-patch14-384"
tinyllava_weights: "outputs/tinyllava_weights.pt"
load_tinyllava_weights: true
use_dino: true
vision_select_layer: -2
connector_hidden_dim: 2048
image_size: 384

# --- Stage 1 checkpoint ---
adapter_checkpoint: "outputs/tinyllava_stage1_adapter_full/checkpoint-final.pt"
lora_checkpoint: null

# --- Data ---
train_metadata: "/datasets/deepfake/ddvqa_prepared/train.jsonl"
val_metadata: "/datasets/deepfake/ddvqa_prepared/val.jsonl"
test_metadata: "/datasets/deepfake/ddvqa_prepared/test.jsonl"
image_root: "/datasets/deepfake/ddvqa_prepared/frames"
max_text_length: 256

# --- LoRA ---
lora_rank: 32
lora_alpha: 64
lora_target_modules:
  - "q_proj"
  - "v_proj"
lora_dropout: 0.05

# --- Training ---
max_epochs: 5
batch_size: 16
gradient_accumulation_steps: 4    # effective batch = 64
num_workers: 2

# O classificador cuida do balanceamento; o LLM treina na distribuição
# natural do dataset. first_token_loss_weight=1.0 (padrão CE) porque o
# LLM não precisa mais "decidir" — o veredito já está no GT.
balanced_sampling: false
first_token_loss_weight: 1.0

train_connector: true
connector_lr: 5.0e-6
adapter_lr: 5.0e-5
lora_lr: 2.0e-5
warmup_ratio: 0.03
max_grad_norm: 1.0

mixed_precision: "bf16"
gradient_checkpointing: true

# --- Logging & checkpointing ---
log_interval: 20
save_interval: 200
val_interval: 100
sample_interval: 100
output_dir: "outputs/tinyllava_stage2_cls_rung"
