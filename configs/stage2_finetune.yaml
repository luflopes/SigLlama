# =============================================================
# Stage 2 — Adapter + LoRA fine-tuning on DD-VQA
# =============================================================
# Train DINOv2 adapter (continued) + LoRA on Gemma2 for
# explainable deepfake detection.
#
# Usage:
#   python training/train_stage2.py --config configs/stage2_finetune.yaml

seed: 42

# --- Models ---
paligemma_model: "google/paligemma2-3b-pt-448"
dinov2_model: "facebook/dinov2-large"
mof_strategy: "interleave"

# --- Stage 1 checkpoint ---
adapter_checkpoint: "outputs/stage1_adapter/checkpoint-final.pt"
lora_checkpoint: null

# --- Data ---
train_metadata: "/datasets/deepfake/ddvqa_prepared/train.jsonl"
val_metadata: "/datasets/deepfake/ddvqa_prepared/val.jsonl"
image_root: "/datasets/deepfake/ddvqa_prepared/frames"
max_text_length: 256

# --- LoRA ---
lora_rank: 16
lora_alpha: 32
lora_target_modules: ["q_proj", "v_proj"]
lora_dropout: 0.05

# --- Training ---
max_epochs: 5
batch_size: 16
gradient_accumulation_steps: 4    # effective batch = 64
num_workers: 8
balanced_sampling: true

adapter_lr: 1.0e-4
lora_lr: 2.0e-5
warmup_ratio: 0.03
max_grad_norm: 1.0

mixed_precision: "bf16"
gradient_checkpointing: true

# --- Logging & checkpointing ---
log_interval: 50
save_interval: 500
val_interval: 500
sample_interval: 1000
output_dir: "outputs/stage2_finetune"
