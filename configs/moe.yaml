# =============================================================
# MoE-specific configuration
# =============================================================
# This file documents the MoE hyper-parameters used by the
# finetuning stage.  It can be imported/merged into the
# finetuning config as needed.

# --- Expert domains (for reference/logging) ---
domain_labels:
  - "GAN"
  - "VAE"
  - "Diffusion"
  - "Transformers"

# --- Architecture ---
num_experts: 4
top_k: 2

# Expert type: "mlp" (full MLP per expert) or "lora" (low-rank delta)
expert_type: "lora"

# MLP expert settings (used when expert_type == "mlp")
mlp_intermediate_factor: 4   # intermediate_dim = hidden_dim * factor

# LoRA expert settings (used when expert_type == "lora")
lora_rank: 16
lora_alpha: 1.0

# --- Load balancing ---
aux_loss_weight: 0.01        # weight of the auxiliary loss term
